    <div class="container">
      <h1>Who was I named after?</h1>
      <div class="gallows" id="gallows"></div>
      <div class="word-display" id="wordDisplay"></div>
      <div class="message" id="message"></div>

      <div class="keyboard" id="keyboard"></div>
    </div>

    <style>
      body {
        background-color: #f9f9f9;
      }
      nav {
        align-items: center;
        background-color: #f1dfe6;
        padding: 20px;
        position: top;

        display: flex;

      .name {
        font-family: "Mrs Saint Delafield", cursive;

      }

      }
      footer {
        background-color: #f1dfe6;

        text-align: center;
        margin: 0;

        color: #333;

      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        text-align: center;
        max-width: 600px;
        width: 100%;
        margin: 120px auto 60px;
      }
      h1 {
        color: #333;
        margin-top: 0;
      }
      .gallows {
        font-family: monospace;
        font-size: 1.2rem;
        white-space: pre;
        padding: 15px;
        border-radius: 6px;
        margin: 20px auto;
        width: 120px;
        text-align: left;
        position: center;
      }
      .word-display {
        font-size: 2rem;
        letter-spacing: 10px;
        margin: 20px 0;
        font-weight: bold;
        min-height: 45px;
      }
      .word-display span {
        display: inline-block;
        margin: 0 5px;
      }
      .word-display .space {
        margin: 0 15px;
        letter-spacing: normal;
      }
      .message {
        font-size: 1.2rem;
        font-weight: bold;
        height: 30px;
        margin-bottom: 20px;
      }
      .keyboard {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
        margin-bottom: 20px;
      }
      button {
        padding: 10px;
        font-size: 1rem;
        font-weight: bold;
        border: none;
        background: #a5bedb;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
      }
      button:hover:not(:disabled) {
        background: #0056b3;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .reset-btn {
        background: #96d8a6;
        grid-column: span 7;
        padding: 12px;
      }
      .reset-btn:hover {
        background: #218838;
      }
    </style>
    <script>
      const targetWord = "JENNIFER LOPEZ";
      let guessedLetters = new Set();
      let mistakes = 0;
      const maxMistakes = 6;

      const gallowsStages = [
        `  +---+

  |   |
      |
      |
      |
      |
=========`,
        `  +---+

  |   |
  O   |
      |
      |
      |
=========`,
        `  +---+

  |   |
  O   |

  |   |
      |
      |
=========`,
        `  +---+

  |   |
  O   |
 /|   |
      |
      |
=========`,
        `  +---+

  |   |
  O   |
 /|\\  |
      |
      |
=========`,
        `  +---+

  |   |
  O   |
 /|\\  |
 /    |
      |
=========`,
        `  +---+

  |   |
  O   |
 /|\\  |
 / \\  |
      |
=========`,
      ];

      function initGame() {
        guessedLetters.clear();
        mistakes = 0;
        document.getElementById("message").innerText =
          "Hint: I was named after a famous singer and actress!";
        document.getElementById("message").style.color = "#333";

        renderWord();
        renderGallows();
        renderKeyboard();
      }

      function renderWord() {
        const display = document.getElementById("wordDisplay");
        display.innerHTML = "";

        for (let char of targetWord) {
          if (char === " ") {
            const spaceSpan = document.createElement("span");
            spaceSpan.className = "space";
            spaceSpan.innerHTML = "&nbsp;";
            display.appendChild(spaceSpan);
          } else if (guessedLetters.has(char)) {
            const letterSpan = document.createElement("span");
            letterSpan.innerText = char;
            display.appendChild(letterSpan);
          } else {
            const letterSpan = document.createElement("span");
            letterSpan.innerText = "_";
            display.appendChild(letterSpan);
          }
        }
      }

      function renderGallows() {
        document.getElementById("gallows").textContent =
          gallowsStages[mistakes];
      }

      function renderKeyboard() {
        const keyboard = document.getElementById("keyboard");
        keyboard.innerHTML = "";

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let letter of alphabet) {
          const btn = document.createElement("button");
          btn.innerText = letter;
          btn.onclick = () => handleGuess(letter);
          keyboard.appendChild(btn);
        }

        const resetBtn = document.createElement("button");
        resetBtn.innerText = "Play Again";
        resetBtn.className = "reset-btn";
        resetBtn.onclick = initGame;
        keyboard.appendChild(resetBtn);
      }

      function handleGuess(letter) {
        guessedLetters.add(letter);

        // Disable the clicked button
        const buttons = document.querySelectorAll(
          "#keyboard button:not(.reset-btn)",
        );
        for (let btn of buttons) {
          if (btn.innerText === letter) {
            btn.disabled = true;
            break;
          }
        }

        if (targetWord.includes(letter)) {
          renderWord();
          checkWin();
        } else {
          mistakes++;
          renderGallows();
          checkLose();
        }
      }

      function checkWin() {
        const hasWon = [...targetWord].every(
          (char) => char === " " || guessedLetters.has(char),
        );
        if (hasWon) {
          document.getElementById("message").innerText =
            "🎉 You Win! It's Jennifer Lopez!";
          document.getElementById("message").style.color = "#28a745";
          disableAllLetters();
        }
      }

      function checkLose() {
        if (mistakes >= maxMistakes) {
          document.getElementById("message").innerText =
            "💥 Game Over! The answer was Jennifer Lopez.";
          document.getElementById("message").style.color = "#dc3545";
          disableAllLetters();

          // Show the full word
          guessedLetters = new Set("JENNIFERLOPEZ");
          renderWord();
        }
      }

      function disableAllLetters() {
        const buttons = document.querySelectorAll(
          "#keyboard button:not(.reset-btn)",
        );
        buttons.forEach((btn) => (btn.disabled = true));
      }

      // Start the game on page load
      initGame();
    </script>
